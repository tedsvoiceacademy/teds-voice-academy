<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500">
<text x="200" y="30" text-anchor="middle" font-size="22">Harmonic Series</text>
<line x1="200" y1="60" x2="200" y2="460" stroke="black"/>
<line x1="180" y1="440" x2="220" y2="440" stroke="black"/>
<text x="230" y="445" font-size="14">Fundamental</text>
<line x1="180" y1="380" x2="220" y2="380" stroke="black"/>
<text x="230" y="385" font-size="14">2nd Harmonic</text>
<line x1="180" y1="320" x2="220" y2="320" stroke="black"/>
<text x="230" y="325" font-size="14">3rd Harmonic</text>
<line x1="180" y1="260" x2="220" y2="260" stroke="black"/>
<text x="230" y="265" font-size="14">4th Harmonic</text>
<line x1="180" y1="200" x2="220" y2="200" stroke="black"/>
<text x="230" y="205" font-size="14">5th Harmonic</text>
<line x1="180" y1="140" x2="220" y2="140" stroke="black"/>
<text x="230" y="145" font-size="14">6th Harmonic</text>
</svg>