
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420">
<text x="450" y="30" text-anchor="middle" font-size="24">In Tune vs Lock & Ring</text>

<!-- Left panel -->
<text x="225" y="70" text-anchor="middle" font-size="16">Ordinary In‑Tune Chord</text>

<!-- voices -->
<circle cx="120" cy="350" r="10"/><text x="120" y="370" text-anchor="middle">Bass</text>
<circle cx="200" cy="350" r="10"/><text x="200" y="370" text-anchor="middle">Bar</text>
<circle cx="280" cy="350" r="10"/><text x="280" y="370" text-anchor="middle">Lead</text>
<circle cx="360" cy="350" r="10"/><text x="360" y="370" text-anchor="middle">Ten</text>

<!-- scattered harmonics -->
<line x1="120" y1="300" x2="120" y2="320"/>
<line x1="200" y1="270" x2="200" y2="290"/>
<line x1="280" y1="240" x2="280" y2="260"/>
<line x1="360" y1="210" x2="360" y2="230"/>

<text x="225" y="190" text-anchor="middle" font-size="14">Harmonics mostly independent</text>

<!-- Right panel -->
<text x="675" y="70" text-anchor="middle" font-size="16">Locked Barbershop Chord</text>

<!-- voices -->
<circle cx="560" cy="350" r="10"/><text x="560" y="370" text-anchor="middle">Bass</text>
<circle cx="640" cy="350" r="10"/><text x="640" y="370" text-anchor="middle">Bar</text>
<circle cx="720" cy="350" r="10"/><text x="720" y="370" text-anchor="middle">Lead</text>
<circle cx="800" cy="350" r="10"/><text x="800" y="370" text-anchor="middle">Ten</text>

<!-- aligned harmonics -->
<line x1="540" y1="260" x2="820" y2="260" stroke-width="3"/>
<line x1="540" y1="220" x2="820" y2="220" stroke-width="3"/>

<text x="675" y="190" text-anchor="middle" font-size="14">Aligned harmonics reinforce</text>

</svg>
