<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400">
<text x="450" y="30" text-anchor="middle" font-size="22">Equal Temperament vs Pure Intonation</text>

<text x="220" y="70" text-anchor="middle">Equal Temperament</text>
<line x1="200" y1="120" x2="200" y2="300" stroke="black"/>
<line x1="200" y1="160" x2="240" y2="160" stroke="black"/>
<line x1="200" y1="200" x2="240" y2="200" stroke="black"/>
<line x1="200" y1="240" x2="240" y2="240" stroke="black"/>
<line x1="200" y1="280" x2="240" y2="280" stroke="black"/>

<text x="680" y="70" text-anchor="middle">Pure Intonation</text>
<line x1="660" y1="120" x2="660" y2="300" stroke="black"/>
<line x1="660" y1="150" x2="700" y2="150" stroke="red"/>
<line x1="660" y1="200" x2="700" y2="200" stroke="red"/>
<line x1="660" y1="240" x2="700" y2="240" stroke="red"/>
<line x1="660" y1="280" x2="700" y2="280" stroke="red"/>

<text x="450" y="200" text-anchor="middle">Ear Training</text>
</svg>
