<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400">
<text x="450" y="30" text-anchor="middle" font-size="24">Constructive vs Destructive Wave Interference</text>

<!-- Constructive -->
<text x="220" y="70" text-anchor="middle" font-size="16">Constructive (waves reinforce)</text>
<path d="M20 120 q50 -50 100 0 t100 0 t100 0" stroke="black" fill="none"/>
<path d="M20 140 q50 -50 100 0 t100 0 t100 0" stroke="gray" fill="none"/>
<path d="M20 200 q50 -100 100 0 t100 0 t100 0" stroke="red" fill="none" stroke-width="2"/>

<!-- Destructive -->
<text x="670" y="70" text-anchor="middle" font-size="16">Destructive (waves cancel)</text>
<path d="M450 120 q50 -50 100 0 t100 0 t100 0" stroke="black" fill="none"/>
<path d="M450 140 q50 50 100 0 t100 0 t100 0" stroke="gray" fill="none"/>
<line x1="450" y1="200" x2="850" y2="200" stroke="red" stroke-width="2"/>
</svg>
